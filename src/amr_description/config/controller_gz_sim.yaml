controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# ─── AckermannSteeringController ──────────────────────────────────
# Tên param theo steering_controllers_library (Humble) — KHỚP với
# repo bạn bè đã chạy được. Các param string_array PHẢI viết dạng
# YAML list (mỗi phần tử một dòng, có dấu "-"), và thứ tự RIGHT trước,
# LEFT sau theo quy ước của controller.
ackermann_steering_controller:
  ros__parameters:

    # ── string_array REQUIRED ──────────────────────────────────────
    # Bánh sau dẫn động (traction) — right trước, left sau
    traction_joints_names:
      - rear_right_wheel_joint
      - rear_left_wheel_joint

    # Khớp lái trước (steering) — right trước, left sau
    steering_joints_names:
      - front_right_steer_joint
      - front_left_steer_joint

    # ── double REQUIRED (đều phải > 0) ────────────────────────────
    wheelbase:              0.210   # khoảng cách trục trước-sau (m)
    traction_track_width:   0.217   # tâm-tâm 2 bánh sau (m)
    steering_track_width:   0.217   # tâm-tâm 2 bánh lái trước (m)
    traction_wheels_radius: 0.05    # bán kính bánh dẫn động (m)

    # ── tùy chọn ──────────────────────────────────────────────────
    open_loop: false          # dùng velocity thực tế từ Gazebo
    position_feedback: false  # đọc velocity state interface
    reference_timeout: 0.5

    # ── TF / odom ─────────────────────────────────────────────────
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true

# ─── JointStateBroadcaster ────────────────────────────────────────
joint_state_broadcaster:
  ros__parameters: {}
