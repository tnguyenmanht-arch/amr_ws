controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# ─── AckermannSteeringController ──────────────────────────────────
# QUAN TRỌNG: bản cài trên máy là ackermann_steering_controller v2.53.1
# (steering_controllers_library API MỚI). Tên param KHÁC bản cũ:
#   front_wheels_names / rear_wheels_names   (KHÔNG phải steering/traction_joints_names)
#   front_wheel_track / rear_wheel_track     (KHÔNG phải steering/traction_track_width)
#   front_wheels_radius / rear_wheels_radius (KHÔNG phải traction_wheels_radius)
# Với xe lái trước, dẫn động sau:
#   front_wheels_names = khớp LÁI   (nhận position command)
#   rear_wheels_names  = khớp DẪN ĐỘNG (nhận velocity command)
# Thứ tự phần tử: index 0 = RIGHT, index 1 = LEFT
# (theo quy ước STATE_*_RIGHT_WHEEL = 0 trong steering_controllers_library).
ackermann_steering_controller:
  ros__parameters:

    # Lái nằm ở cầu trước
    front_steering: true

    # ── string_array REQUIRED ──────────────────────────────────────
    # Khớp lái trước (front) — right trước, left sau
    front_wheels_names:
      - front_right_steer_joint
      - front_left_steer_joint

    # Bánh dẫn động sau (rear) — right trước, left sau
    rear_wheels_names:
      - rear_right_wheel_joint
      - rear_left_wheel_joint

    # ── hình học (double, đều phải > 0) ───────────────────────────
    wheelbase:           0.210   # khoảng cách trục trước-sau (m)
    front_wheel_track:   0.217   # tâm-tâm 2 bánh lái trước (m)
    rear_wheel_track:    0.217   # tâm-tâm 2 bánh sau (m)
    front_wheels_radius: 0.05    # bán kính bánh trước (m) — khớp wheel_radius trong URDF
    rear_wheels_radius:  0.05    # bán kính bánh sau (m)

    # ── tùy chọn ──────────────────────────────────────────────────
    open_loop: false          # dùng velocity thực tế từ Gazebo
    position_feedback: false  # đọc velocity state interface
    reference_timeout: 0.5

    # ── TF / odom ─────────────────────────────────────────────────
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true

# ─── JointStateBroadcaster ────────────────────────────────────────
joint_state_broadcaster:
  ros__parameters: {}
