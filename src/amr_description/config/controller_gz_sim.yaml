controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# ─── AckermannSteeringController ──────────────────────────────────
# Tên param lấy từ steering_controllers_library_parameters.hpp
# và ackermann_steering_controller_parameters.hpp (build Humble)
ackermann_steering_controller:
  ros__parameters:

    # ── string_array REQUIRED ──────────────────────────────────────
    # Joints bánh sau dẫn động (continuous, axis Y)
    rear_wheels_names:
      - rear_right_wheel_joint
      - rear_left_wheel_joint

    # Joints bánh trước lái (revolute, axis Z)
    front_wheels_names:
      - front_right_steer_joint
      - front_left_steer_joint

    # ── double REQUIRED (tất cả phải > 0, validation gt(0.0)) ─────
    front_wheel_track: 0.217    # khoảng cách tâm-tâm bánh trước (m)
    rear_wheel_track:  0.217    # khoảng cách tâm-tâm bánh sau (m)
    wheelbase:         0.210    # khoảng cách trục trước-sau (m)
    front_wheels_radius: 0.05   # bán kính bánh trước (m)
    rear_wheels_radius:  0.05   # bán kính bánh sau (m)

    # ── bool / int tùy chọn ───────────────────────────────────────
    front_steering: true                  # lái phía trước (Ackermann chuẩn)
    open_loop: false                      # dùng encoder feedback
    position_feedback: true               # dùng position state interface
    velocity_rolling_window_size: 10      # cửa sổ lọc tốc độ
    reduce_wheel_speed_until_steering_reached: false

    # ── TF / odom ─────────────────────────────────────────────────
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true

# ─── JointStateBroadcaster ────────────────────────────────────────
joint_state_broadcaster:
  ros__parameters: {}
